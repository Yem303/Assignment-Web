<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce</title>
    <link rel="stylesheet" href="./src/output.css">
      <link href="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.css"  rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <!-- section header -->
    <div class=" w-full p-2  ">
        <section class=" w-full top-0 sticky z-50 bg-white">
            <header class=" w-[90%] py-8 flex flex-wrap justify-between   m-auto   ">
                <!-- logo -->
                <ul class="p-2  flex flex-col md:flex-row ">
                    <li><i class="fa-solid fa-cart-shopping text-3xl font-bold  text-orange-600"></i><span class=" text-orange-600 font-bold text-3xl">Online</span> <span class=" text-3xl font-bold ">Store</span></li>
                </ul>
                <!-- toggle button -->
                 <button data-collapse-toggle="navbar-default" class="  xl:hidden md:hidden  justify-end"><i class="fa-solid fa-bars text-2xl"></i></button>
              
                <!-- menu -->
               <menu class="hidden w-full md:block md:w-auto sm:it" id="navbar-default">
                    <ul class=" p-2  flex flex-col md:flex-row  md:p-0">
                        
                        <li class="xl:text-[16px] lg:text-[14px] md:text-[12px] font-medium cursor-pointer px-4 py-2 rounded-md  hover:bg-amber-400 hover:underline transition-all flex items-center gap-2 " >
                            <i class="fa-solid fa-house"></i>
                            <a href="">Home</a>
                        </li>

                        <li class="xl:text-[16px] lg:text-[14px] md:text-[12px] font-medium cursor-pointer px-4 py-2 rounded-md hover:bg-amber-400 hover:underline transition-all flex items-center gap-2">
                            <i class="fa-solid fa-list"></i>
                            <a href="">Product List</a>
                        </li>

                        <li class="xl:text-[16px] lg:text-[14px] md:text-[12px] font-medium cursor-pointer px-4 py-2 rounded-md hover:bg-amber-400 hover:underline transition-all flex items-center gap-2">
                            <i class="fa-solid fa-box"></i>
                            <a href="">Categories</a>
                        </li>

                        <li class="xl:text-[16px] lg:text-[14px] md:text-[12px] font-medium cursor-pointer px-4 py-2 rounded-md hover:bg-amber-400 hover:underline transition-all flex items-center gap-2">
                            <i class="fa-solid fa-circle-info"></i>
                            <a href="">About</a>
                        </li>

                        <li class="xl:text-[16px] lg:text-[14px] md:text-[12px] font-medium cursor-pointer px-4 py-2 rounded-md hover:bg-amber-400 hover:underline transition-all flex items-center gap-2">
                            <i class="fa-solid fa-envelope"></i>
                            <a href="">Contact</a>
                        </li>

                        <li class="xl:text-[16px] lg:text-[14px] md:text-[12px] font-medium cursor-pointer px-4 py-2 rounded-md hover:bg-amber-400 hover:underline transition-all flex items-center gap-2">
                            <i class="fa-solid fa-user"></i></i>
                            <a href="">Sign Up</a>
                        </li>
                        <li class="xl:text-[16px] lg:text-[14px] md:text-[12px] font-medium cursor-pointer px-4 py-2 rounded-md hover:bg-amber-400 hover:underline transition-all flex items-center gap-2 ">
                            <!-- <i class="fa-solid fa-sun"></i></i> -->
                             <i class="fa-solid fa-moon"></i>
                    
                        </li>

                    </ul>
            </menu>
              
            </header>
        </section>

        <!-- hero section -->
       <section class="w-full bg-gradient-to-r from-blue-200 to-pink-400 py-10">
    <div id="default-carousel" class="relative w-full" data-carousel="slide">

        <!-- Slides -->
        <div class="relative h-[500px] overflow-hidden rounded-lg ">

            <!-- Slide 1 -->
            <div class="hidden duration-700 ease-in-out grid lg:grid-cols-2 md:grid-cols-2 grid-cols-1 items-center px-10" data-carousel-item>

                <!-- Text -->
                <div class="space-y-4 ">
                    <h1 class="text-3xl md:text-5xl font-bold text-gray-800">
                        Welcome to our <span class="text-blue-600">Store</span>
                    </h1>

                    <div class="flex gap-4">
                        <button class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-transparent border hover:border-green-600 hover:text-black">
                            Buy Now
                        </button>

                        <button class="border border-black px-6 py-3 rounded-lg hover:bg-blue-600 hover:text-white transition">
                            Shop All
                        </button>
                    </div>
                </div>

                <!-- Image -->
                <div class="flex justify-center">
                    <img src="https://static.vecteezy.com/system/resources/previews/047/249/338/original/sweater-shirt-hoodie-isolated-png.png" 
                        alt="Hoodie"
                        class="w-[80%] object-contain">
                </div>

            </div>
            <!-- Slide 2 -->
            <div class="hidden duration-700 ease-in-out grid lg:grid-cols-2 md:grid-cols-2 grid-cols-1 items-center px-10" data-carousel-item>

                <!-- Text -->
                <div class="space-y-4 ">
                    <h1 class="text-3xl md:text-5xl font-bold text-gray-800">
                        Welcome to our <span class="text-blue-600">Store</span>
                    </h1>

                    <div class="flex gap-4">
                        <button class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-transparent border hover:border-green-600 hover:text-black">
                            Buy Now
                        </button>

                        <button class="border border-black px-6 py-3 rounded-lg hover:bg-blue-600 hover:text-white transition">
                            Shop All
                        </button>
                    </div>
                </div>

                <!-- Image -->
                <div class="flex justify-center">
                    <img src="https://static.vecteezy.com/system/resources/previews/047/249/338/original/sweater-shirt-hoodie-isolated-png.png" 
                        alt="Hoodie"
                        class="w-[80%] object-contain">
                </div>

            </div>

          
        </div>
    </div>
</section>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</html>
